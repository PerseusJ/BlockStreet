main: com.perseusj.blockstreet.BlockStreet
version: 1.0.0-SNAPSHOT
name: BlockStreet
author: PerseusJ
api-version: '1.21'
depend: [Vault]
soft-depend: [PlaceholderAPI]

commands:
  blockstreet:
    description: "BlockStreet — player-run commodity exchange"
    usage: "/bs <menu|buy|sell|market|cancel|orders|history|price|admin|help>"
    aliases: [bs, bse, market]
    permission: blockstreet.use

permissions:
  blockstreet.use:
    description: "Allows use of all standard BlockStreet trading commands."
    default: true

  blockstreet.admin:
    description: "Allows use of BlockStreet admin commands (/bs admin reload|wipe|release|setprice)."
    default: op

  blockstreet.*:
    description: "Grants all BlockStreet permissions."
    default: false
    children:
      blockstreet.use: true
      blockstreet.admin: true