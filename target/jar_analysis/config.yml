# BlockStreet — Default Configuration
# All values in this file are defaults. Do NOT edit this file directly.
# Changes here are overridden by user's config.yml in the plugin data folder.

database:
  type: SQLITE          # SQLITE or MYSQL
  host: localhost
  port: 3306
  name: blockstreet
  user: root
  password: ""
  sqlite-file: "blockstreet.db"

engine:
  db-write-interval-seconds: 3
  gui-refresh-ticks: 10          # how often the market GUI re-renders (ticks)
  order-expiry-hours: 72         # resting orders auto-cancelled after N hours
  max-open-orders-per-player: 10
  taker-fee-percentage: 1.0      # % of gross trade value destroyed as economy sink
                                  # Makers always pay 0%. Range: 0.0–100.0. Recommended: 0.5–2.0.

gui:
  market-depth-levels: 5         # top N bid/ask levels shown in GUI
  currency-symbol: "$"
  price-format: "#,##0.00"

assets:
  DIAMOND:
    display-name: "Diamond"
    material: DIAMOND
    min-price: 0.01
    max-price: 1000000.0
    min-qty: 1
    max-qty: 1000
    price-tick: 0.01             # minimum price increment — ALL prices normalised to this
    enabled: true

  NETHERITE_INGOT:
    display-name: "Netherite Ingot"
    material: NETHERITE_INGOT
    min-price: 1.0
    max-price: 10000000.0
    min-qty: 1
    max-qty: 64
    price-tick: 0.10
    enabled: true

messages:
  prefix: "§8[§6BlockStreet§8]§r "
  order-placed: "§aOrder placed! ID: {orderId}"
  order-filled: "§aYour order for {qty}x {symbol} filled at ${price}. Fee: ${fee}"
  order-cancelled: "§eOrder {orderId} cancelled. Refund processed."
  order-rejected: "§cOrder rejected: {reason}"
  market-order-partial: "§eMarket order partially filled ({filled}/{qty}). Insufficient liquidity."
